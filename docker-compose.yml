services:
  frontend-blue:
    build:
      context: ./app
    image: omnibot-frontend:blue
    container_name: omnibot-frontend-blue
    ports:
      - "${BLUE_PORT}:80"
    restart: always

  frontend-green:
    build:
      context: ./app
    image: omnibot-frontend:green
    container_name: omnibot-frontend-green
    ports:
      - "${GREEN_PORT}:80"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: omnibot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend-blue
      - frontend-green
    restart: always

  postgres:
    image: postgres:16
    container_name: omnibot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/sairo_pgbdscript.sql:/docker-entrypoint-initdb.d/sairo_pgbdscript.sql
    restart: always

volumes:
  postgres_data: