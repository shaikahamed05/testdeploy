name: Deploy Main to EC2

on:
  push:
    branches:
      - main

jobs:
  bootstrap-server:
    name: Bootstrap EC2 Server
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Install Server Dependencies
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            echo "Updating packages..."
            sudo yum update -y

            echo "Installing dependencies..."
            sudo yum install -y git docker wget tar gzip unzip python3 python3-pip

            echo "Starting Docker..."
            sudo systemctl enable docker
            sudo systemctl start docker

            echo "Adding Docker permission for current user..."
            sudo usermod -aG docker ${USER}
            sudo chmod 666 /var/run/docker.sock

            echo "Installing Docker Compose plugin for current user..."
            mkdir -p ~/.docker/cli-plugins

            if ! docker compose version >/dev/null 2>&1; then
              wget -q -O ~/.docker/cli-plugins/docker-compose \
              https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64

              chmod +x ~/.docker/cli-plugins/docker-compose
            fi

            echo "Checking installed versions..."
            git --version
            docker --version
            docker compose version
            python3 --version

            echo "Bootstrap completed."

          EOF

  clone-repository:
    name: Clone or Update Repository
    runs-on: ubuntu-latest
    needs: bootstrap-server

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Clone Repository
        run: |
            ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            BASE_DIR="/home/${USER}/omnibot"

            REPO_URL="https://github.com/shaikahamed05/testdeploy.git"

            mkdir -p "$BASE_DIR"

            # First time clone
            if [ ! -d "$BASE_DIR/.git" ]; then

                echo "Initializing repository..."

                cd "$BASE_DIR"

                git init

                git remote add origin "$REPO_URL"

                git fetch origin

                git checkout -b main origin/main

            else

                echo "Repository already exists. Pulling latest changes..."

                cd "$BASE_DIR"

                git fetch origin

                git reset --hard origin/main

            fi

            echo "Repository updated successfully."

            EOF
          
  prepare-environment:
    name: Prepare Deployment Environment
    runs-on: ubuntu-latest
    needs: clone-repository

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare Files and Folders
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            BASE_DIR="/home/${USER}/omnibot"
            APP_DIR="$BASE_DIR"

            mkdir -p "$BASE_DIR/nginx"
            mkdir -p "$BASE_DIR/database"
            mkdir -p "$BASE_DIR/scripts"

            cp "$APP_DIR/docker-compose.yml" "$BASE_DIR/docker-compose.yml"
            cp "$APP_DIR/.env" "$BASE_DIR/.env"
            cp -r "$APP_DIR/nginx/"* "$BASE_DIR/nginx/"
            cp -r "$APP_DIR/scripts/"* "$BASE_DIR/scripts/"
            chmod +x "$BASE_DIR/scripts/"*.sh
            cp "$APP_DIR/database/sairo_pgbdscript.sql" "$BASE_DIR/database/sairo_pgbdscript.sql"

            echo "Environment prepared."

          EOF

  start-database:
    name: Start PostgreSQL Database
    runs-on: ubuntu-latest
    needs: prepare-environment

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Start PostgreSQL Container
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            cd /home/${USER}/omnibot

            docker compose up -d postgres

            echo "PostgreSQL started."

          EOF

  start-nginx:
    name: Start Nginx Reverse Proxy
    runs-on: ubuntu-latest
    needs: start-database

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Start Nginx Container
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            cd /home/${USER}/omnibot

            if [ ! -f nginx/default.conf ]; then
              cp nginx/nginx-blue.conf nginx/default.conf
            fi

            docker compose up -d nginx

            echo "Nginx started."

          EOF

  deploy-application:
    name: Blue Green Application Deployment
    runs-on: ubuntu-latest
    needs: start-nginx

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Blue Green Containers
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            cd /home/${USER}/omnibot

            CURRENT=$(grep -o "frontend-[a-z]*" nginx/default.conf | head -1 || true)

            if [ -z "$CURRENT" ]; then
              CURRENT="frontend-green"
            fi

            echo "Current Active Environment: $CURRENT"

            if [ "$CURRENT" = "frontend-blue" ]; then
              echo "Deploying GREEN..."

              docker compose build frontend-green
              docker compose up -d frontend-green

              bash scripts/health-check.sh green
              bash scripts/switch-green.sh

              echo "GREEN is LIVE"
            else
              echo "Deploying BLUE..."

              docker compose build frontend-blue
              docker compose up -d frontend-blue

              bash scripts/health-check.sh blue
              bash scripts/switch-blue.sh

              echo "BLUE is LIVE"
            fi

          EOF

  cleanup-server:
    name: Cleanup Docker Resources
    runs-on: ubuntu-latest
    needs: deploy-application

    steps:
      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Cleanup Docker Images
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            docker image prune -f

            echo "Docker cleanup completed."

          EOF